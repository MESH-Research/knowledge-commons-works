creatorsroles:
  pid-type: crr
  data-file: vocabularies/roles_creator.yaml
communitytypes:
  pid-type: comtyp
  data-file: vocabularies/community_types.yaml
contributorsroles:
  pid-type: cor
  data-file: vocabularies/roles_contributor.yaml
descriptiontypes:
  pid-type: dty
  data-file: vocabularies/description_types.yaml
licenses:
  pid-type: lic
  data-file: vocabularies/licenses.csv
resourcetypes:
  pid-type: rsrct
  data-file: vocabularies/resource_types.yaml
subjects:
  pid-type: sub
  schemes:
    - id: Homosaurus
      name: Homosaurus
      uri: "https://homosaurus.org/"
      data-file: vocabularies/homosaurus/subjects_homosaurus.jsonl
# We disabled FOS subjects
# subjects:
#   pid-type: sub
#   schemes:
#     - id: FOS
#       name: Fields of Science and Technology
#       uri: "http://www.oecd.org/science/inno/38235147.pdf"
#       data-file: vocabularies/subjects_oecd_fos.yaml
titletypes:
  pid-type: ttyp
  data-file: vocabularies/title_types.yaml
# Note: `affiliations` is intentionally not declared here. It is seeded from
# live ROR via `invenio vocabularies import -v affiliations` (uses the
# upstream contrib ROR HTTP datastream pipeline) and refreshed on a schedule
# by the `process_ror_affiliations` invenio-jobs Job. See
# docs/source/setup/installation.md, step 5, for the seed/bootstrap commands.
