# Compose stack for Knowledge Commons Works.
#
# Base file (this): app services use the image's invenio.cfg, app_data, and
# .env/.invenio* under /opt/invenio; only named data volumes and the importer
# bind remain here. Host overlays for instance files and repo source are in
# docker-compose.dev.yml. CI (e.g. .github/workflows/build.yml) uses this file alone.
#
# Local live checkout / hot reload: also pass --file docker-compose.dev.yml
# (see that file and kcworks-startup.sh).
#
# Usage (image + data volumes only)::
#
#   $ docker-compose --file docker-compose.yml up -d
#
# Following services are included (host ports configurable via .env; see docker-services.yml header):
# - Frontend: Nginx (defaults: 80, 443 — KCWORKS_NGINX_HTTP_HOST_PORT / KCWORKS_NGINX_HTTPS_HOST_PORT)
# - Cache: Redis (default host: 6379)
# - UI application: UWSGI (ephemeral publish port)
# - API application: UWSGI (ephemeral publish port)
# - DB: PostgreSQL (default host: 5432)
# - Message queue: RabbitMQ (defaults: 5672, 15672)
# - Search platform: OpenSearch (defaults: 9200, 9600)
# - OpenSearch Dashboard (default host: 5601)
#
services:
  cache:
    extends:
      file: docker-services.yml
      service: cache
    volumes:
      - cache_data:/data
  db:
    extends:
      file: docker-services.yml
      service: db
    volumes:
      - database_data:/var/lib/postgresql/data
  mq:
    extends:
      file: docker-services.yml
      service: mq
    volumes:
      - mq_data:/var/lib/rabbitmq
  search:
    extends:
      file: docker-services.yml
      service: search
    # Incident (2026-04): after compose refactor + custom host ports (e.g. 9201),
    # `search` sometimes had host publish mappings missing on full project stop/start
    # (curl to 127.0.0.1:9201 failed; `docker inspect` showed PortBindings intent but
    # empty NetworkSettings.Ports). Recreating only `search` temporarily fixed it.
    # Fix: declare `ports` here on the stack file alongside `volumes`, not only on
    # the extended service in docker-services.yml, so bindings stay applied across cycles.
    ports:
      - "${KCWORKS_OPENSEARCH_HTTP_HOST_PORT:-9200}:9200"
      - "${KCWORKS_OPENSEARCH_PERF_ANALYZER_HOST_PORT:-9600}:9600"
    volumes:
      - search_data:/usr/share/opensearch/data
  opensearch-dashboards:
    extends:
      file: docker-services.yml
      service: opensearch-dashboards
  pgadmin:
    extends:
      file: docker-services.yml
      service: pgadmin
    volumes:
      - pgadmin_data:/var/lib/pgadmin
  # Frontend
  frontend:
    extends:
      file: docker-services.yml
      service: frontend
    container_name: ${KCWORKS_CONTAINERS_BASE_NAME:-kcworks}-frontend
    build: ./docker/nginx_local/
    volumes:
      - ./docker/nginx_local/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx_local/conf.d:/etc/nginx/conf.d
      - ./static:/opt/invenio/var/instance/static
    depends_on:
      - web-ui
      - web-api
    ports:
      - "${KCWORKS_NGINX_HTTP_HOST_PORT:-80}:80"
      - "${KCWORKS_NGINX_HTTPS_HOST_PORT:-443}:443"
  # UI Application
  # This container holds Python, pip, the virtualenv, and the invenio code,
  # Node.js, NPM and some standard libraries Invenio usually needs
  # command: ["uwsgi /opt/invenio/var/instance/uwsgi_ui.ini --daemonize=logs/uwsgi-ui.log --log-reopen --pidfile=/tmp/kcr_ui.pid"]
  web-ui:
    extends:
      file: docker-services.yml
      service: app
    container_name: ${KCWORKS_CONTAINERS_BASE_NAME:-kcworks}-ui
    command: ["/opt/invenio/var/instance/startup_ui_dev.sh"]
    image: monotasker/kcworks:${IMAGE_TAG:-latest}
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - INVENIO_LOGGING_CONSOLE=True
      - INVENIO_LOGGING_CONSOLE_LEVEL=INFO
      - INVENIO_COMMONS_API_REQUEST_PROTOCOL=https
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONWARNINGS=ignore::DeprecationWarning,ignore::SyntaxWarning
    ports:
      - "5000"
    volumes:
      # - ./celerybeat-schedule:/opt/invenio/src/celerybeat-schedule
      - archived_data:/opt/invenio/var/instance/archive
      - uploaded_data:/opt/invenio/var/instance/data
      - /${INVENIO_RECORD_IMPORTER_LOCAL_DATA_DIR}:${INVENIO_RECORD_IMPORTER_DATA_DIR:-/opt/invenio/var/import_data}
    depends_on:
      search:
        condition: service_healthy
  # API Rest Application
  web-api:
    extends:
      file: docker-services.yml
      service: app
    container_name: ${KCWORKS_CONTAINERS_BASE_NAME:-kcworks}-api
    command: ["/opt/invenio/var/instance/startup_api_dev.sh"]
    image: monotasker/kcworks:${IMAGE_TAG:-latest}
    ports:
      - "5001"
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - INVENIO_LOGGING_CONSOLE=True
      - INVENIO_LOGGING_CONSOLE_LEVEL=INFO
      - INVENIO_COMMONS_API_REQUEST_PROTOCOL=https
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONWARNINGS=ignore::DeprecationWarning,ignore::SyntaxWarning
    volumes:
      # - ./celerybeat-schedule:/opt/invenio/src/celerybeat-schedule
      - archived_data:/opt/invenio/var/instance/archive
      - uploaded_data:/opt/invenio/var/instance/data
      - /${INVENIO_RECORD_IMPORTER_LOCAL_DATA_DIR}:${INVENIO_RECORD_IMPORTER_DATA_DIR:-/opt/invenio/var/import_data}
    depends_on:
      search:
        condition: service_healthy
  # Worker
  worker:
    extends:
      file: docker-services.yml
      service: app
    container_name: ${KCWORKS_CONTAINERS_BASE_NAME:-kcworks}-worker
    command: ["/opt/invenio/var/instance/startup_worker_dev.sh"]
    image: monotasker/kcworks:${IMAGE_TAG:-latest}
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - INVENIO_LOGGING_CONSOLE=True
      - INVENIO_LOGGING_CONSOLE_LEVEL=INFO
      - INVENIO_COMMONS_API_REQUEST_PROTOCOL=https
      - PYTHONDONTWRITEBYTECODE=1
      # - INVENIO_LOGGING_FS_LEVEL=DEBUG
      # - INVENIO_LOGGING_FS_BACKUP_COUNT=10
      # - INVENIO_LOGGING_FS_LOGFILE=/opt/invenio/src/logs/invenio.log
      - PYTHONWARNINGS=ignore::DeprecationWarning,ignore::SyntaxWarning
    volumes:
      # - ./celerybeat-schedule:/opt/invenio/src/celerybeat-schedule
      - archived_data:/opt/invenio/var/instance/archive
      - uploaded_data:/opt/invenio/var/instance/data
      - /${INVENIO_RECORD_IMPORTER_LOCAL_DATA_DIR}:${INVENIO_RECORD_IMPORTER_DATA_DIR:-/opt/invenio/var/import_data}
    depends_on:
      search:
        condition: service_healthy
      cache:
        condition: service_started
      db:
        condition: service_started
      mq:
        condition: service_started
  # Jobs scheduler
  scheduler:
    extends:
      file: docker-services.yml
      service: app
    command: ["celery -A invenio_app.celery beat --scheduler invenio_jobs.services.scheduler:RunScheduler --loglevel=INFO"]
    image: monotasker/kcworks:${IMAGE_TAG:-latest}
    depends_on:
      mq:
        condition: service_started
      db:
        condition: service_started
volumes:
  archived_data:
  static_data:
  uploaded_data:
  database_data:
  cache_data:
  mq_data:
  search_data:
  pgadmin_data:
